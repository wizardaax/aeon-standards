# ============================================================
# Auditor Agent — aeon-standards
#
# Triggered by repository_dispatch event_type=agent.task.auditor
#
# Responsibilities:
#   1. For each repo in repo_scope:
#      a. Check latest CI run status (lint / test / security).
#      b. Verify branch protection: required status check names
#         match the stable job names (python-ci, security).
#      c. Audit action SHA pinning: flag any workflow that uses
#         a third-party action without a full commit-SHA pin.
#   2. Emit PASS or FAIL + required remediations.
#   3. Post result envelope to the run issue.
#   4. Fire orchestrator.reduce.
#
# The auditor blocks merge (escalate=true) on any finding at
# or above audit_block_severity from orchestrator-policy.yml.
#
# Required secrets:
#   GH_ORCHESTRATOR_TOKEN — PAT/App token with
#   actions:read + administration:read on target repos.
# ============================================================
name: Agent — Auditor

on:
  repository_dispatch:
    types: [agent.task.auditor]

jobs:
  auditor-agent:
    name: "Auditor agent: standards and security review"
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # ------------------------------------------------------------------
      # Extract payload
      # ------------------------------------------------------------------
      - name: Extract dispatch payload
        id: payload
        run: |
          echo "run_id=${{ github.event.client_payload.run_id }}"               >> "$GITHUB_OUTPUT"
          echo "task_id=${{ github.event.client_payload.task_id }}"             >> "$GITHUB_OUTPUT"
          echo "issue_number=${{ github.event.client_payload.issue_number }}"   >> "$GITHUB_OUTPUT"
          echo "mode=${{ github.event.client_payload.mode }}"                   >> "$GITHUB_OUTPUT"
          echo "attempt=${{ github.event.client_payload.attempt || '1' }}"      >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # Mark task as running
      # ------------------------------------------------------------------
      - name: Mark task running
        env:
          GH_TOKEN: ${{ secrets.GH_ORCHESTRATOR_TOKEN || github.token }}
        run: |
          ISSUE_NUMBER="${{ steps.payload.outputs.issue_number }}"
          RUN_ID="${{ steps.payload.outputs.run_id }}"
          TASK_ID="${{ steps.payload.outputs.task_id }}"
          TS=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          ATTEMPT="${{ steps.payload.outputs.attempt }}"
          REPO_SCOPE='${{ toJson(github.event.client_payload.repo_scope) }}'
          GOAL="${{ github.event.client_payload.goal }}"
          MODE="${{ steps.payload.outputs.mode }}"

          ENVELOPE=$(jq -n \
            --arg    run_id        "${RUN_ID}"      \
            --arg    goal          "${GOAL}"        \
            --argjson repo_scope   "${REPO_SCOPE}"  \
            --arg    task_id       "${TASK_ID}"     \
            --arg    ts            "${TS}"          \
            --argjson issue_number "${ISSUE_NUMBER}" \
            --argjson attempt      "${ATTEMPT}"     \
            --arg    mode          "${MODE}"        \
            '{
              run_id:           $run_id,
              goal:             $goal,
              repo_scope:       $repo_scope,
              task_id:          $task_id,
              agent:            "auditor",
              state:            "running",
              attempt:          $attempt,
              depends_on:       ["task-001","task-002"],
              artifacts:        [],
              result:           null,
              timestamp:        $ts,
              run_issue_number: $issue_number,
              mode:             $mode
            }')

          COMMENT="<!-- orchestrator:envelope task_id=\"${TASK_ID}\" run_id=\"${RUN_ID}\" -->
          \`\`\`json
          ${ENVELOPE}
          \`\`\`"
          printf '%s' "${COMMENT}" > /tmp/running_comment.md
          gh issue comment "${ISSUE_NUMBER}" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/running_comment.md

      # ------------------------------------------------------------------
      # Load policy thresholds
      # ------------------------------------------------------------------
      - name: Load audit policy
        id: policy
        run: |
          python3 - <<'PYEOF'
          import json, os, yaml
          with open('orchestrator-policy.yml') as f:
              p = yaml.safe_load(f)
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"block_severity={p.get('audit_block_severity', 'high')}\n")
              out.write(f"require_sha_pins={str(p.get('require_action_sha_pins', True)).lower()}\n")
              checks = json.dumps(p.get('required_status_checks', ['python-ci', 'security']))
              out.write(f"required_checks={checks}\n")
          PYEOF

      # ------------------------------------------------------------------
      # Run audits
      # ------------------------------------------------------------------
      - name: Audit repos
        id: audit
        env:
          GH_TOKEN: ${{ secrets.GH_ORCHESTRATOR_TOKEN || github.token }}
          REPO_SCOPE: ${{ toJson(github.event.client_payload.repo_scope) }}
          BLOCK_SEVERITY: ${{ steps.policy.outputs.block_severity }}
          REQUIRE_SHA_PINS: ${{ steps.policy.outputs.require_sha_pins }}
          REQUIRED_CHECKS: ${{ steps.policy.outputs.required_checks }}
        run: |
          python3 - <<'PYEOF'
          import base64, json, os, re, subprocess, sys

          REPO_SCOPE        = json.loads(os.environ["REPO_SCOPE"])
          GH_TOKEN          = os.environ.get("GH_TOKEN", "")
          REQUIRE_SHA_PINS  = os.environ.get("REQUIRE_SHA_PINS", "true").lower() == "true"
          STABLE_CHECKS     = set(json.loads(os.environ.get("REQUIRED_CHECKS", '["python-ci","security"]')))

          # Actions that are exempt from SHA-pin requirement (GitHub-owned first-party)
          EXEMPT_OWNERS = {"actions", "github"}

          # SHA-pinned pattern: uses: owner/repo@<40-hex-char SHA>
          sha_pin_re  = re.compile(r'uses:\s+([^@\s]+)@([0-9a-f]{40})', re.IGNORECASE)
          # Any uses: line (to catch non-SHA refs)
          uses_re     = re.compile(r'uses:\s+([^@\s]+)@(\S+)')

          def gh(*args, input_data=None):
              r = subprocess.run(
                  ["gh"] + list(args),
                  input=input_data, text=True, capture_output=True,
                  env={**os.environ, "GH_TOKEN": GH_TOKEN}
              )
              return r

          findings     = []
          remediations = []
          details      = {}

          for repo in REPO_SCOPE:
              print(f"\n--- Auditing {repo} ---")
              details[repo] = {"checks": {}, "sha_pin_violations": []}

              # 1. Latest CI run status
              run_r = gh("run", "list", "--repo", repo,
                         "--limit", "1",
                         "--json", "conclusion,status,workflowName",
                         "--jq", ".[0]")
              if run_r.returncode == 0 and run_r.stdout.strip() and run_r.stdout.strip() != "null":
                  try:
                      run_info = json.loads(run_r.stdout.strip())
                      conclusion = run_info.get("conclusion", "unknown")
                      details[repo]["checks"]["latest_run"] = conclusion
                      if conclusion in ("failure", "timed_out"):
                          findings.append(f"{repo}: latest CI run is {conclusion}")
                  except json.JSONDecodeError:
                      pass

              # 2. Branch protection: required status checks
              bp_r = gh("api",
                        f"/repos/{repo}/branches/main/protection",
                        "--jq", ".required_status_checks.contexts")
              if bp_r.returncode == 0 and bp_r.stdout.strip():
                  try:
                      contexts = json.loads(bp_r.stdout.strip()) or []
                      missing = STABLE_CHECKS - set(contexts)
                      details[repo]["checks"]["branch_protection_contexts"] = contexts
                      if missing:
                          findings.append(
                              f"{repo}: branch protection missing required checks: {missing}"
                          )
                          remediations.append(
                              f"Add required status checks to {repo}/main: {missing}"
                          )
                  except json.JSONDecodeError:
                      pass
              else:
                  details[repo]["checks"]["branch_protection"] = "not_configured"
                  findings.append(f"{repo}: branch protection not configured on main")
                  remediations.append(f"Enable branch protection with required checks on {repo}/main")

              # 3. SHA-pin audit on all workflow files
              if REQUIRE_SHA_PINS:
                  wf_r = gh("api", f"/repos/{repo}/contents/.github/workflows",
                             "--jq", "[.[] | select(.type == \"file\") | .path]")
                  if wf_r.returncode == 0 and wf_r.stdout.strip():
                      try:
                          wf_paths = json.loads(wf_r.stdout.strip())
                      except json.JSONDecodeError:
                          wf_paths = []

                      for wf_path in wf_paths:
                          content_r = gh("api",
                                         f"/repos/{repo}/contents/{wf_path}",
                                         "--jq", ".content")
                          if content_r.returncode != 0:
                              continue
                          try:
                              content = base64.b64decode(
                                  content_r.stdout.strip().replace("\\n", "")
                              ).decode("utf-8", errors="replace")
                          except Exception:
                              continue

                          for m in uses_re.finditer(content):
                              action_ref  = m.group(1)
                              ref_val     = m.group(2)
                              owner       = action_ref.split("/")[0]

                              # Skip reusable workflow refs (contain .github/workflows)
                              if ".github/workflows" in action_ref:
                                  continue
                              # Skip exempt owners
                              if owner.lower() in EXEMPT_OWNERS:
                                  continue
                              # Check if it's a 40-char hex SHA
                              if not re.fullmatch(r'[0-9a-f]{40}', ref_val, re.IGNORECASE):
                                  violation = f"{wf_path}: {action_ref}@{ref_val}"
                                  details[repo]["sha_pin_violations"].append(violation)
                                  findings.append(
                                      f"{repo}: action not SHA-pinned: {action_ref}@{ref_val}"
                                  )
                                  remediations.append(
                                      f"Pin {action_ref} to a full commit SHA in {repo}/{wf_path}"
                                  )

          ok      = len(findings) == 0
          escalate = not ok
          summary = (
              f"Audit PASS: {len(REPO_SCOPE)} repo(s) checked, no findings."
              if ok else
              f"Audit FAIL: {len(findings)} finding(s) across {len(REPO_SCOPE)} repo(s)."
          )

          result = {
              "ok":           ok,
              "summary":      summary,
              "details":      details,
              "remediations": remediations,
              "escalate":     escalate,
          }

          with open("/tmp/audit_result.json", "w") as f:
              json.dump(result, f)

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"ok={'true' if ok else 'false'}\n")
              out.write(f"summary={summary}\n")

          if findings:
              print(f"\n❌ {len(findings)} finding(s):")
              for f_item in findings:
                  print(f"  - {f_item}")
          else:
              print(f"\n✅ All checks passed")
          PYEOF

      # ------------------------------------------------------------------
      # Audit open PRs across all repos in scope
      # ------------------------------------------------------------------
      - name: Audit open PRs
        id: pr_audit
        env:
          GH_TOKEN: ${{ secrets.GH_ORCHESTRATOR_TOKEN || github.token }}
          REPO_SCOPE: ${{ toJson(github.event.client_payload.repo_scope) }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess

          REPO_SCOPE = json.loads(os.environ["REPO_SCOPE"])
          GH_TOKEN   = os.environ.get("GH_TOKEN", "")

          def gh(*args):
              r = subprocess.run(
                  ["gh"] + list(args),
                  text=True, capture_output=True,
                  env={**os.environ, "GH_TOKEN": GH_TOKEN}
              )
              return r

          pr_report = {}
          total_open = 0

          for repo in REPO_SCOPE:
              print(f"\n--- Open PRs in {repo} ---")
              pr_r = gh(
                  "pr", "list",
                  "--repo", repo,
                  "--state", "open",
                  "--json", "number,title,isDraft,mergeStateStatus,mergeable,url",
                  "--limit", "100",
              )
              if pr_r.returncode != 0:
                  print(f"  ⚠️  Could not list PRs for {repo}: {pr_r.stderr.strip()}")
                  pr_report[repo] = {"error": pr_r.stderr.strip(), "prs": []}
                  continue

              try:
                  prs = json.loads(pr_r.stdout.strip())
              except json.JSONDecodeError:
                  prs = []

              pr_report[repo] = {"prs": prs}
              total_open += len(prs)

              if not prs:
                  print("  ✅  No open PRs")
              else:
                  for pr in prs:
                      draft_tag   = " [DRAFT]" if pr.get("isDraft") else ""
                      merge_state = pr.get("mergeStateStatus", "UNKNOWN")
                      mergeable   = pr.get("mergeable", "UNKNOWN")
                      print(
                          f"  #{pr['number']} {pr['title']}{draft_tag} "
                          f"| merge_state={merge_state} mergeable={mergeable} "
                          f"| {pr.get('url', '')}"
                      )

          summary_line = (
              f"PR Audit: {total_open} open PR(s) across {len(REPO_SCOPE)} repo(s)."
          )
          print(f"\n{summary_line}")

          with open("/tmp/pr_audit_result.json", "w") as f:
              json.dump({"total_open": total_open, "by_repo": pr_report}, f)

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"pr_summary={summary_line}\n")
              out.write(f"total_open={total_open}\n")
          PYEOF

      # ------------------------------------------------------------------
      # Merge PR audit results into main audit result
      # ------------------------------------------------------------------
      - name: Merge PR audit into result
        run: |
          python3 - <<'PYEOF'
          import json

          with open("/tmp/audit_result.json") as f:
              result = json.load(f)

          try:
              with open("/tmp/pr_audit_result.json") as f:
                  pr_result = json.load(f)
          except FileNotFoundError:
              pr_result = {}

          result["open_prs"] = pr_result
          with open("/tmp/audit_result.json", "w") as f:
              json.dump(result, f)
          PYEOF

      # ------------------------------------------------------------------
      # Post result envelope
      # ------------------------------------------------------------------
      - name: Post result envelope
        env:
          GH_TOKEN: ${{ secrets.GH_ORCHESTRATOR_TOKEN || github.token }}
        run: |
          ISSUE_NUMBER="${{ steps.payload.outputs.issue_number }}"
          RUN_ID="${{ steps.payload.outputs.run_id }}"
          TASK_ID="${{ steps.payload.outputs.task_id }}"
          MODE="${{ steps.payload.outputs.mode }}"
          ATTEMPT="${{ steps.payload.outputs.attempt }}"
          TS=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          OK="${{ steps.audit.outputs.ok || 'true' }}"
          REPO_SCOPE='${{ toJson(github.event.client_payload.repo_scope) }}'
          GOAL="${{ github.event.client_payload.goal }}"
          STATE="done"
          if [ "${OK}" != "true" ]; then STATE="failed"; fi

          RESULT=$(cat /tmp/audit_result.json 2>/dev/null || echo '{"ok":true,"summary":"completed"}')

          ENVELOPE=$(jq -n \
            --arg    run_id        "${RUN_ID}"      \
            --arg    goal          "${GOAL}"        \
            --argjson repo_scope   "${REPO_SCOPE}"  \
            --arg    task_id       "${TASK_ID}"     \
            --arg    state         "${STATE}"       \
            --argjson attempt      "${ATTEMPT}"     \
            --arg    ts            "${TS}"          \
            --argjson issue_number "${ISSUE_NUMBER}" \
            --arg    mode          "${MODE}"        \
            --argjson result       "${RESULT}"      \
            '{
              run_id:           $run_id,
              goal:             $goal,
              repo_scope:       $repo_scope,
              task_id:          $task_id,
              agent:            "auditor",
              state:            $state,
              attempt:          $attempt,
              depends_on:       ["task-001","task-002"],
              artifacts:        [],
              result:           $result,
              timestamp:        $ts,
              run_issue_number: $issue_number,
              mode:             $mode
            }')

          COMMENT="<!-- orchestrator:envelope task_id=\"${TASK_ID}\" run_id=\"${RUN_ID}\" -->
          \`\`\`json
          ${ENVELOPE}
          \`\`\`"
          printf '%s' "${COMMENT}" > /tmp/result_comment.md
          gh issue comment "${ISSUE_NUMBER}" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/result_comment.md
          echo "✅  Posted result envelope for ${TASK_ID} (state=${STATE})"

      # ------------------------------------------------------------------
      # Fire reducer
      # ------------------------------------------------------------------
      - name: Trigger orchestrator reducer
        env:
          GH_TOKEN: ${{ secrets.GH_ORCHESTRATOR_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::warning::GH_ORCHESTRATOR_TOKEN not set — reducer not triggered."
            exit 0
          fi

          PAYLOAD=$(jq -n \
            --arg  run_id       "${{ steps.payload.outputs.run_id }}"       \
            --arg  task_id      "${{ steps.payload.outputs.task_id }}"      \
            --argjson issue_number "${{ steps.payload.outputs.issue_number }}" \
            --arg  goal         "${{ github.event.client_payload.goal }}"   \
            --argjson repo_scope '${{ toJson(github.event.client_payload.repo_scope) }}' \
            --arg  mode         "${{ steps.payload.outputs.mode }}"         \
            '{
              event_type: "orchestrator.reduce",
              client_payload: {
                run_id:       $run_id,
                task_id:      $task_id,
                issue_number: $issue_number,
                goal:         $goal,
                repo_scope:   $repo_scope,
                mode:         $mode
              }
            }')

          echo "${PAYLOAD}" | gh api "/repos/${GITHUB_REPOSITORY}/dispatches" \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            --input -
          echo "✅  Reducer triggered"
